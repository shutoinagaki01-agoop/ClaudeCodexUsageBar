name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build app bundle
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Package app
        run: |
          ditto -c -k --keepParent build/ClaudeCodexUsageBar.app ClaudeCodexUsageBar.zip
          shasum -a 256 ClaudeCodexUsageBar.zip > ClaudeCodexUsageBar.zip.sha256
          cat ClaudeCodexUsageBar.zip.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeCodexUsageBar
          path: |
            ClaudeCodexUsageBar.zip
            ClaudeCodexUsageBar.zip.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              ClaudeCodexUsageBar.zip \
              ClaudeCodexUsageBar.zip.sha256 \
              --clobber
          else
            gh release create "$TAG_NAME" \
              ClaudeCodexUsageBar.zip \
              ClaudeCodexUsageBar.zip.sha256 \
              --title "$TAG_NAME" \
              --notes "ClaudeCodexUsageBar $TAG_NAME"
          fi
